<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Response Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .test-button {
            background: linear-gradient(135deg, #FF9933 0%, #B45309 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin: 10px;
        }
        .result {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .event-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .verdict-fake { border-left: 5px solid #dc3545; }
        .verdict-uncertain { border-left: 5px solid #ffc107; }
        .verdict-real { border-left: 5px solid #138808; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 API Response Test</h1>
        <p>Testing the live events API to check if news data is properly structured.</p>
        
        <button onclick="testLiveEventsAPI()" class="test-button">🔍 Test Live Events API</button>
        <button onclick="testNewsFeeds()" class="test-button">📰 Test News Feed Processing</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function testLiveEventsAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result info">🔄 Testing live events API...</div>';
            
            try {
                const response = await fetch('http://localhost:8080/api/v1/events/live?limit=5');
                const data = await response.json();
                
                let html = '<div class="result success">';
                html += `<h3>✅ API Response (${data.events.length} events):</h3>`;
                html += `<p><strong>Total Count:</strong> ${data.total_count}</p>`;
                html += `<p><strong>Processing Active:</strong> ${data.processing_active}</p>`;
                
                if (data.events && data.events.length > 0) {
                    html += '<h4>📊 Event Structure Analysis:</h4>';
                    const firstEvent = data.events[0];
                    const fields = Object.keys(firstEvent);
                    html += `<p><strong>Available Fields:</strong> ${fields.join(', ')}</p>`;
                    
                    html += '<h4>📰 Sample Events:</h4>';
                    data.events.forEach((event, index) => {
                        const verdictClass = `verdict-${event.verdict || 'unknown'}`;
                        html += `
                            <div class="event-card ${verdictClass}">
                                <strong>Event ${index + 1}:</strong><br>
                                <strong>Title:</strong> ${event.title.substring(0, 100)}...<br>
                                <strong>Source:</strong> ${event.source}<br>
                                <strong>State:</strong> ${event.state || 'Unknown'}<br>
                                <strong>Verdict:</strong> ${event.verdict || 'Missing'}<br>
                                <strong>Misinformation Score:</strong> ${event.misinformation_score || 'Missing'}<br>
                                <strong>Confidence:</strong> ${event.confidence || 'Missing'}<br>
                            </div>
                        `;
                    });
                } else {
                    html += '<p>❌ No events found in response</p>';
                }
                
                html += '</div>';
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function testNewsFeeds() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result info">🔄 Testing news feed processing...</div>';
            
            try {
                const response = await fetch('http://localhost:8080/api/v1/events/live?limit=20');
                const data = await response.json();
                
                if (data.events && data.events.length > 0) {
                    // Filter like the frontend does
                    const fakeEvents = data.events.filter(event => 
                        event.verdict === 'fake' || event.verdict === 'uncertain'
                    );
                    const realEvents = data.events.filter(event => event.verdict === 'real');
                    
                    let html = '<div class="result success">';
                    html += '<h3>📊 News Feed Analysis:</h3>';
                    html += `<p><strong>Total Events:</strong> ${data.events.length}</p>`;
                    html += `<p><strong>Fake/Uncertain Events:</strong> ${fakeEvents.length}</p>`;
                    html += `<p><strong>Real Events:</strong> ${realEvents.length}</p>`;
                    
                    if (fakeEvents.length > 0) {
                        html += '<h4>🚨 Misinformation Feed (Sample):</h4>';
                        fakeEvents.slice(0, 3).forEach(event => {
                            html += `
                                <div class="event-card verdict-${event.verdict}">
                                    <strong>🚨 ${event.title.substring(0, 100)}...</strong><br>
                                    <small>${event.source} • ${event.state || 'India'}</small><br>
                                    <span style="color: #dc3545; font-weight: bold;">${event.verdict.toUpperCase()}</span>
                                    <span style="float: right;">${Math.round(event.confidence * 100)}% confidence</span>
                                </div>
                            `;
                        });
                    } else {
                        html += '<p>✅ No misinformation detected recently!</p>';
                    }
                    
                    if (realEvents.length > 0) {
                        html += '<h4>✅ Real News Feed (Sample):</h4>';
                        realEvents.slice(0, 3).forEach(event => {
                            html += `
                                <div class="event-card verdict-real">
                                    <strong>✅ ${event.title.substring(0, 100)}...</strong><br>
                                    <small>${event.source} • ${event.state || 'India'}</small><br>
                                    <span style="color: #138808; font-weight: bold;">VERIFIED</span>
                                    <span style="float: right;">${Math.round(event.confidence * 100)}% confidence</span>
                                </div>
                            `;
                        });
                    } else {
                        html += '<p>📰 Loading verified news...</p>';
                    }
                    
                    html += '</div>';
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<div class="result error">❌ No events found</div>';
                }
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Auto-run test on page load
        window.addEventListener('load', () => {
            setTimeout(testLiveEventsAPI, 1000);
        });
    </script>
</body>
</html>

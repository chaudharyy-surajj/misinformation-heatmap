<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdict Distribution Check</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .verdict-fake { background: rgba(220, 53, 69, 0.1); border-left: 5px solid #dc3545; }
        .verdict-uncertain { background: rgba(255, 193, 7, 0.1); border-left: 5px solid #ffc107; }
        .verdict-real { background: rgba(19, 136, 8, 0.1); border-left: 5px solid #138808; }
        .event { padding: 10px; margin: 5px 0; border-radius: 5px; }
        .stats { background: #e9ecef; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Verdict Distribution Analysis</h1>
        <button onclick="analyzeVerdicts()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">🔍 Analyze Current Data</button>
        
        <div id="results"></div>
    </div>

    <script>
        async function analyzeVerdicts() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>🔄 Analyzing...</p>';
            
            try {
                const response = await fetch('http://localhost:8080/api/v1/events/live?limit=50');
                const data = await response.json();
                
                if (data.events && data.events.length > 0) {
                    const verdictCounts = { fake: 0, uncertain: 0, real: 0 };
                    const eventsByVerdict = { fake: [], uncertain: [], real: [] };
                    
                    data.events.forEach(event => {
                        const verdict = event.verdict || 'unknown';
                        if (verdictCounts.hasOwnProperty(verdict)) {
                            verdictCounts[verdict]++;
                            eventsByVerdict[verdict].push(event);
                        }
                    });
                    
                    let html = `
                        <div class="stats">
                            <h3>📊 Verdict Distribution (${data.events.length} events)</h3>
                            <p><strong>🚨 Fake:</strong> ${verdictCounts.fake} events</p>
                            <p><strong>⚠️ Uncertain:</strong> ${verdictCounts.uncertain} events</p>
                            <p><strong>✅ Real:</strong> ${verdictCounts.real} events</p>
                        </div>
                    `;
                    
                    // Show samples of each type
                    ['fake', 'uncertain', 'real'].forEach(verdict => {
                        if (eventsByVerdict[verdict].length > 0) {
                            html += `<h3>${verdict.toUpperCase()} News (${eventsByVerdict[verdict].length} events)</h3>`;
                            eventsByVerdict[verdict].slice(0, 3).forEach(event => {
                                html += `
                                    <div class="event verdict-${verdict}">
                                        <strong>${event.title.substring(0, 100)}...</strong><br>
                                        <small>Source: ${event.source} | State: ${event.state || 'Unknown'}</small><br>
                                        <small>Score: ${event.misinformation_score.toFixed(3)} | Confidence: ${(event.confidence * 100).toFixed(1)}%</small>
                                    </div>
                                `;
                            });
                        }
                    });
                    
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<p>❌ No events found</p>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<p>❌ Error: ${error.message}</p>`;
            }
        }
        
        // Auto-run on page load
        window.addEventListener('load', () => {
            setTimeout(analyzeVerdicts, 1000);
        });
    </script>
</body>
</html>
